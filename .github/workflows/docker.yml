name: Docker Build & Push (GHCR + Docker Hub)

on:
  push:
    branches: [main, brick2]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Override tag (e.g. dev, rc1)"
        required: false
        default: ""

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docker:
    name: build & push brick image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write    # push to GHCR via GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- Registry auth ---

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # --- Compute tags (multi-registry) ---

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/regolo-ai/brick
            ${{ secrets.DOCKERHUB_USERNAME && 'docker.io/regolo/brick' || '' }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      # --- Build & push ---

      - name: Build and push (router)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/router/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=brick-router
          cache-to: type=gha,scope=brick-router,mode=max

      - name: Image digest
        run: echo "Pushed digest ${{ steps.meta.outputs.tags }}"
