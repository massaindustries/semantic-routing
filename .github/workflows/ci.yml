name: CI

on:
  push:
    branches: [main, brick2]
  pull_request:
    branches: [main, brick2]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install pre-commit
      - run: pre-commit run --all-files --show-diff-on-failure
        env:
          SKIP: "golang-lint,cargo-check,cargo-fmt,js-ts-lint"

  go-test:
    name: go test (router)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: apps/router/src/semantic-router/go.sum
      - name: Install Rust (for CGO bindings build artifacts)
        uses: dtolnay/rust-toolchain@stable
      - name: Build Rust bindings (shared libs needed by CGO link)
        run: |
          cd apps/router/candle-binding && cargo build --release --no-default-features
          cd ../ml-binding              && cargo build --release
          cd ../nlp-binding             && cargo build --release
          mkdir -p /tmp/libs
          cp candle-binding/target/release/libcandle_semantic_router.so /tmp/libs/ || true
          cp ml-binding/target/release/libml_semantic_router.so         /tmp/libs/ || true
          cp nlp-binding/target/release/libnlp_binding.so               /tmp/libs/ || true
        working-directory: apps/router
        continue-on-error: true
      - name: go vet
        working-directory: apps/router/src/semantic-router
        run: go vet ./...
      - name: go test
        working-directory: apps/router/src/semantic-router
        env:
          CGO_CFLAGS: "-I${{ github.workspace }}/apps/router/candle-binding -I${{ github.workspace }}/apps/router/ml-binding -I${{ github.workspace }}/apps/router/nlp-binding"
          CGO_LDFLAGS: "-L/tmp/libs -lcandle_semantic_router -lml_semantic_router -lnlp_binding"
          LD_LIBRARY_PATH: "/tmp/libs"
        run: go test ./... -short

  rust-test:
    name: cargo test (${{ matrix.crate }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: [candle-binding, ml-binding, nlp-binding]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/router/${{ matrix.crate }} -> target
      - name: cargo check
        working-directory: apps/router/${{ matrix.crate }}
        run: cargo check --no-default-features
      - name: cargo test
        working-directory: apps/router/${{ matrix.crate }}
        run: cargo test --no-default-features

  python-test:
    name: pytest (packages/evals)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - uses: astral-sh/setup-uv@v3
      - name: uv sync
        run: uv sync --frozen 2>/dev/null || uv sync
      - name: pytest (smoke + unit, no network)
        run: uv run pytest packages/evals/tests -q -k "not network and not integration" -x --maxfail=3
        continue-on-error: true   # graders need API keys; allow soft-fail until secrets wired

  node-test:
    name: npm test (apps/cli)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/cli/package-lock.json
      - name: npm ci
        working-directory: apps/cli
        run: npm ci
      - name: npm run build
        working-directory: apps/cli
        run: npm run build
      - name: npm run lint
        working-directory: apps/cli
        run: npm run lint
      - name: npm test
        working-directory: apps/cli
        run: npm test
        continue-on-error: true   # vitest harness may need TTY for some tests; smoke covered by build+lint
