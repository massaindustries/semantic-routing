# Brick → Claude Code stack (mymodel + GPU classifier).
#
# Linux: `docker compose -f docker-compose.brick-cc.yml up -d`
#   Requires nvidia-container-toolkit installed on the host.
# Windows 11: `docker compose -f docker-compose.brick-cc.yml up -d`
#   Requires Docker Desktop with WSL2 backend + recent NVIDIA driver
#   (NVIDIA Container Toolkit is shipped inside WSL2 by the Windows driver).
# macOS: GPU not supported by Docker Desktop. Use the SkyPilot remote
#   classifier deploy (deploy/addons/brick-complexity-server/sky-classifier.yaml) instead.
#
# Required env vars (use a `.env` next to this file or export before `up`):
#   BRICK_CLASSIFIER_TOKEN  random secret protecting /classify (generated by setup.ps1)
# Optional:
#   HF_TOKEN                speeds up the first classifier startup if set
#   BRICK_CC_TAG            image tag, default `latest`
#   BRICK_CC_HOST_PORT      mymodel port on host, default 18000

x-images:
  classifier-image: &classifier-image ghcr.io/regolo-ai/brick-cc-classifier:${BRICK_CC_TAG:-latest}
  mymodel-image:    &mymodel-image    ghcr.io/regolo-ai/brick-cc-mymodel:${BRICK_CC_TAG:-latest}

services:
  classifier:
    image: *classifier-image
    container_name: brick-cc-classifier
    environment:
      BRICK_CLASSIFIER_TOKEN: ${BRICK_CLASSIFIER_TOKEN:?missing — run setup.ps1 or write .env}
      HF_TOKEN: ${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - hf-cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8094/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    restart: unless-stopped
    networks: [brick-cc]

  mymodel:
    image: *mymodel-image
    container_name: brick-cc-mymodel
    depends_on:
      classifier:
        condition: service_healthy
    environment:
      BRICK_CLASSIFIER_TOKEN: ${BRICK_CLASSIFIER_TOKEN:?missing}
    ports:
      - "${BRICK_CC_HOST_PORT:-18000}:8000"
    volumes:
      - ./config.brick-cc.yaml:/app/config/config.yaml:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped
    networks: [brick-cc]

networks:
  brick-cc:
    driver: bridge

volumes:
  hf-cache:
