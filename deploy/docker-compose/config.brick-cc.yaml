# Brick → Claude Code config (Docker Compose deploy, GPU classifier locally).
# Only the bits strictly needed for the Anthropic pass-through are populated;
# semantic routing / vLLM / brick-multimodal pieces are stubs because the
# /v1/messages handler bypasses them entirely.

model:
  name: "brick-cc"
  description: "Brick router for Claude Code subscription pass-through"

server_port: 8000
auto_model_name: "brick-cc"

# Stubs (required by config loader, not exercised on /v1/messages path)
providers:
  regoloai:
    type: openai-compatible
    base_url: https://api.regolo.ai/v1
provider_profiles:
  regolo:
    type: openai
    base_url: https://api.regolo.ai/v1
vllm_endpoints:
  - name: "regolo"
    provider_profile: "regolo"
    weight: 1
default_model: "claude-sonnet-4-6"
model_config:
  claude-haiku-4-5: { preferred_endpoints: ["regolo"], param_size: "1b" }
  claude-sonnet-4-6: { preferred_endpoints: ["regolo"], param_size: "1b" }
  claude-opus-4-7: { preferred_endpoints: ["regolo"], param_size: "1b" }

# Complexity classifier — points at the local GPU container via the compose
# service DNS name. Bearer token is injected via env var by docker-compose.
complexity_service:
  enabled: true
  base_url: "http://classifier:8094"
  bearer_token: "${BRICK_CLASSIFIER_TOKEN}"
  timeout_seconds: 8
  auto_spawn: false

# Anthropic pass-through — the only routing this deployment performs.
anthropic_passthrough:
  enabled: true
  upstream_url: "https://api.anthropic.com"
  extra_usage_enabled: false
  context_1m_threshold_bytes: 600000
  model_map:
    easy: "claude-haiku-4-5"
    medium: "claude-sonnet-4-6"
    hard: "claude-opus-4-7"
  model_map_1m:
    easy: "claude-sonnet-4-6"
    medium: "claude-sonnet-4-6"
    hard: "claude-opus-4-7"

# No keyword/domain rules and no decisions: this deployment never runs the
# semantic-routing pipeline, only the /v1/messages Anthropic pass-through.
decisions: []
