name: brick-classifier

resources:
  accelerators: L40S:1

workdir: .

secrets:
  BRICK_CLASSIFIER_TOKEN: null
  HF_TOKEN: null

setup: |
  set -euo pipefail
  python3 -m pip install --upgrade pip
  python3 -m pip install -r requirements-gpu.txt
  if [ -n "${HF_TOKEN:-}" ]; then
    hf auth login --token "$HF_TOKEN" --add-to-git-credential || true
  fi
  hf download regolo/brick-complexity-extractor
  hf download Qwen/Qwen3.5-0.8B

run: |
  set -euo pipefail
  # Idempotent: pip install + hf download are no-ops when already cached.
  # Lives in `run` (not just `setup`) so `sky exec` reruns work too.
  python3 -m pip install -q -r requirements-gpu.txt
  if [ -n "${HF_TOKEN:-}" ] && ! hf whoami >/dev/null 2>&1; then
    hf auth login --token "$HF_TOKEN" --add-to-git-credential || true
  fi
  hf download regolo/brick-complexity-extractor >/dev/null
  hf download Qwen/Qwen3.5-0.8B >/dev/null
  pkill -f 'server.py.*--port 8094' 2>/dev/null || true
  python3 server.py --port 8094 --device cuda --bearer-token "$BRICK_CLASSIFIER_TOKEN"
