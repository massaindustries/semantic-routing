[project]
name = "brick-datasets"
version = "2.0.0"
description = "Brick: HuggingFace download recipes for Dataset A, Dataset B, capability+complexity classifier models"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
readme = "README.md"

dependencies = [
    "huggingface-hub>=0.25",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["scripts"]
