# Sources del Dataset A - 6.000 query stratificate su 6 dimension
# Schema: source_id -> { dimension, repo, config, split, target_n, license, gated, shots, fewshot_pool, filter, expected_protocol }

# === instruction_following (1000) ===

ifeval:
  dimension: instruction_following
  repo: google/IFEval
  config: null
  split: train  # IFEval ha solo train split
  target_n: 700  # espanso da 500 (Multi-IF rimosso per cc-by-nc)
  license: apache-2.0
  gated: false
  shots: 5
  fewshot_pool:
    repo: google/IFEval
    split: train
    note: "self-pool, esempi disjoint dall'eval via hash"
  filter: null
  expected_protocol: ifeval_constraint_check
  source_label: IFEval

ifbench:
  dimension: instruction_following
  repo: allenai/IFBench_test
  config: null
  split: train  # IFBench_test ha solo split 'train' (nome del repo include "_test")
  target_n: 300
  license: ODC-BY-1.0
  gated: false
  shots: 5
  fewshot_pool:
    repo: google/IFEval  # IFBench non ha train; IFEval style-similar
    split: train
  filter: null
  expected_protocol: ifeval_constraint_check
  source_label: IFBench

# === coding (1000) ===

livecodebench_v6:
  dimension: coding
  repo: livecodebench/code_generation_lite
  config: null
  split: test
  target_n: 1000
  license: cc-by-4.0
  gated: false
  shots: 5
  custom_handler: livecodebench  # usa 10c_download_livecodebench.py (datasets script deprecated)
  fewshot_pool:
    repo: livecodebench/code_generation_lite
    split: test
    note: "filtro release_v5 o piu vecchi come pool, eval su release_v6"
  filter:
    field: release_version
    value: release_v6
    fallback_field: contest_date
    fallback_min: "2024-08-01"
  expected_protocol: lcb_unit_test
  source_label: LiveCodeBench-v6

# === math_reasoning (1000) ===

math500:
  dimension: math_reasoning
  repo: HuggingFaceH4/MATH-500
  config: null
  split: test
  target_n: 500
  license: mit
  gated: false
  shots: 5
  fewshot_pool:
    repo: cais/competition_math  # fallback (lighteval/MATH non esiste)
    split: train
  filter: null
  expected_protocol: math_equiv
  source_label: MATH-500

aime_2025:
  dimension: math_reasoning
  repo: opencompass/AIME2025
  configs: [AIME2025-I, AIME2025-II]  # multi-config: handler dedicato in 10_download.py
  split: test
  target_n: 30  # 15 + 15 = 30 (AIME2025 totale, non 50). Documentato rev.4
  license: mit
  gated: false
  shots: 5
  fewshot_pool:
    repo: cais/competition_math
    split: train
  filter: null
  expected_protocol: math_equiv
  source_label: AIME-2025
  contamination_risk: low  # post-Feb-2025, fresh per cutoff modelli

gsm8k:
  dimension: math_reasoning
  repo: openai/gsm8k
  config: main
  split: test
  target_n: 470  # +20 (era 450) per coprire deficit AIME 2025 (50→30)
  license: mit
  gated: false
  shots: 5
  fewshot_pool:
    repo: openai/gsm8k
    config: main
    split: train
  filter: null
  expected_protocol: gsm8k_final_answer
  source_label: GSM8K
  contamination_risk: high  # noto contaminato in training set

