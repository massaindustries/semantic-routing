# === planning_agentic (1000, 0-shot) ===

bfcl_v4:
  dimension: planning_agentic
  repo: gorilla-llm/Berkeley-Function-Calling-Leaderboard
  config: null  # NO load_dataset, usa list_repo_files
  split: null
  target_n: 500
  license: apache-2.0
  gated: false
  shots: 0
  fewshot_pool: null
  filter:
    note: "stratify across categories: simple, multiple, parallel, parallel_multiple, irrelevance"
  expected_protocol: tool_call_match
  source_label: BFCL-v4

tau_bench:
  dimension: planning_agentic
  repo: null  # GitHub
  github_url: "https://github.com/sierra-research/tau-bench"
  target_n: 0  # DEPRECATED rev.6: sostituito da bfcl_v4_multi_turn (LLM user-sim → scripted user, deterministico)
  license: mit
  gated: false
  shots: 0
  fewshot_pool: null
  filter:
    domains: [retail, airline]
  expected_protocol: tool_call_trajectory
  source_label: tau-bench

bfcl_v4_multi_turn:
  dimension: planning_agentic
  repo: gorilla-llm/Berkeley-Function-Calling-Leaderboard
  config: null
  split: null
  target_n: 165
  license: apache-2.0
  gated: false
  shots: 0
  fewshot_pool: null
  filter:
    note: "5 multi-turn categories: base/miss_func/miss_param/long_context (composite escluso, deprecato in v4)"
