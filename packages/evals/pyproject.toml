[project]
name = "brick-evals"
version = "2.0.0"
description = "Brick — Dataset A evaluation pipeline, graders, 3-judge panel, RouteLLM/FrugalGPT/Cascade baselines"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
readme = "README.md"

dependencies = [
    "datasets>=2.21",
    "huggingface-hub>=0.25",
    "httpx>=0.27",
    "tenacity>=9.0",
    "pyyaml>=6.0",
    "python-dotenv>=1.0",
    "pandas>=2.2",
    "numpy>=1.26",
    "tqdm>=4.66",
    "openai>=1.50",
    "anthropic>=0.34",
    "transformers>=4.45",
    "tiktoken>=0.7",
    "regex>=2024.7",
    "rapidfuzz>=3.9",
    "scipy>=1.13",
    "scikit-learn>=1.5",
    "tabulate>=0.9",
    "matplotlib>=3.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/brick_evals"]
